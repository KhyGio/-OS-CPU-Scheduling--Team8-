<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CPU Scheduling Simulator</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --card: #21263a;
    --border: #2e3451;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --text: #e2e8f0;
    --muted: #8892a4;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1d2e 0%, #12152a 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header .logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  header h1 { font-size: 1.35rem; font-weight: 700; }
  header p  { font-size: 0.78rem; color: var(--muted); }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    min-height: calc(100vh - 73px);
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
  }

  .main {
    padding: 28px 28px;
    overflow-y: auto;
  }

  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    margin-top: 20px;
  }
  .section-title:first-child { margin-top: 0; }

  /* Process table */
  .process-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-bottom: 12px;
  }
  .process-table th {
    background: var(--card);
    padding: 7px 8px;
    text-align: center;
    color: var(--muted);
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .process-table td {
    padding: 5px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .process-table input {
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    text-align: center;
    padding: 3px;
    border-radius: 4px;
    font-size: 0.82rem;
    transition: border-color 0.2s;
  }
  .process-table input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
  }
  .del-btn {
    background: none;
    border: none;
    color: var(--accent3);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 5px;
    border-radius: 4px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .del-btn:hover { opacity: 1; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-ghost {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b83ff);
    color: white;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.4); }
  .btn-success {
    background: linear-gradient(135deg, var(--accent2), #00b894);
    color: #0a2a22;
  }
  .btn-success:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,212,170,0.35); }

  .btns-row { display: flex; gap: 8px; flex-wrap: wrap; }

  label.field-label {
    display: block;
    font-size: 0.73rem;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .field-group { margin-bottom: 14px; }
  select, input[type=number] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 7px;
    font-size: 0.85rem;
    transition: border-color 0.2s;
  }
  select:focus, input[type=number]:focus {
    outline: none;
    border-color: var(--accent);
  }
  select option { background: var(--card); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  /* Algorithm tabs */
  .algo-tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .algo-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .algo-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Gantt chart */
  .gantt-wrap {
    overflow-x: auto;
    margin-bottom: 24px;
  }
  .gantt-container {
    min-width: 600px;
    position: relative;
    padding-bottom: 32px;
  }
  .gantt-row {
    display: flex;
    height: 52px;
    align-items: stretch;
  }
  .gantt-block {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    border-right: 2px solid var(--bg);
    position: relative;
    min-width: 28px;
    transition: opacity 0.2s;
    border-radius: 0;
  }
  .gantt-block:first-child { border-radius: 8px 0 0 8px; }
  .gantt-block:last-child  { border-radius: 0 8px 8px 0; border-right: none; }
  .gantt-block.idle {
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    font-size: 0.7rem;
    border: 1px dashed var(--border);
  }
  .gantt-times {
    display: flex;
    position: absolute;
    bottom: 0; left: 0; right: 0;
    font-size: 0.68rem;
    color: var(--muted);
  }
  .gantt-tick {
    position: absolute;
    bottom: 0;
    transform: translateX(-50%);
  }

  /* Metrics table */
  .metrics-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.84rem;
    margin-bottom: 20px;
  }
  .metrics-table th {
    background: var(--card);
    padding: 10px 12px;
    text-align: center;
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .metrics-table td {
    padding: 9px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .metrics-table tr:hover td { background: rgba(108,99,255,0.06); }
  .metrics-table .avg-row td {
    background: rgba(0,212,170,0.08);
    color: var(--accent2);
    font-weight: 700;
    border-bottom: none;
  }

  /* Comparison chart */
  .compare-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .compare-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .compare-card h4 {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 14px;
    font-weight: 700;
  }
  .bar-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .bar-label { font-size: 0.73rem; width: 80px; color: var(--muted); }
  .bar-track {
    flex: 1; height: 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 7px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 7px;
    transition: width 0.6s ease;
  }
  .bar-val {
    font-size: 0.73rem;
    width: 34px;
    text-align: right;
    color: var(--text);
    font-weight: 600;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    background: rgba(108,99,255,0.2);
    color: var(--accent);
    margin-left: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .compare-grid { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">⚙️</div>
  <div>
    <h1>CPU Scheduling Simulator</h1>
    <p>FCFS · SJF · SRT · Round Robin · MLFQ</p>
  </div>
</header>

<div class="layout">
  <!-- ───── SIDEBAR ───── -->
  <aside class="sidebar">
    <div class="section-title">Processes</div>

    <table class="process-table" id="proc-table">
      <thead>
        <tr>
          <th>PID</th>
          <th>Arrival</th>
          <th>Burst</th>
          <th>Pri</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="proc-body"></tbody>
    </table>

    <div class="btns-row" style="margin-bottom:14px">
      <button class="btn btn-ghost" onclick="addRow()">＋ Add</button>
      <button class="btn btn-ghost" onclick="loadSample()">📋 Sample</button>
      <button class="btn btn-ghost" onclick="clearAll()">🗑 Clear</button>
    </div>

    <hr class="divider"/>

    <div class="section-title">Algorithm</div>
    <div class="field-group">
      <label class="field-label">Select Algorithm</label>
      <select id="algo-select" onchange="onAlgoChange()">
        <option value="all">▶ Run All (Compare)</option>
        <option value="fcfs">FCFS – First Come First Serve</option>
        <option value="sjf">SJF – Shortest Job First</option>
        <option value="srt">SRT – Shortest Remaining Time</option>
        <option value="rr">RR – Round Robin</option>
        <option value="mlfq">MLFQ – Multilevel Feedback Queue</option>
      </select>
    </div>

    <div id="rr-config" style="display:none">
      <div class="field-group">
        <label class="field-label">Time Quantum (RR)</label>
        <input type="number" id="rr-q" value="2" min="1"/>
      </div>
    </div>

    <div id="mlfq-config" style="display:none">
      <div class="field-group">
        <label class="field-label">MLFQ Queue 1 Quantum</label>
        <input type="number" id="mlfq-q1" value="2" min="1"/>
      </div>
      <div class="field-group">
        <label class="field-label">MLFQ Queue 2 Quantum</label>
        <input type="number" id="mlfq-q2" value="4" min="1"/>
      </div>
      <div class="field-group">
        <label class="field-label">Queue 3 = FCFS (unlimited)</label>
      </div>
      <div class="field-group">
        <label class="field-label">Aging Threshold</label>
        <input type="number" id="mlfq-age" value="10" min="1"/>
      </div>
    </div>

    <div id="rr-mlfq-both" style="display:none">
      <div class="field-group">
        <label class="field-label">Time Quantum (RR)</label>
        <input type="number" id="all-rr-q" value="2" min="1"/>
      </div>
    </div>

    <hr class="divider"/>

    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="simulate()">
      ▶ Run Simulation
    </button>
    <br/>
    <button class="btn btn-success" style="width:100%;justify-content:center;margin-top:8px" onclick="exportCSV()">
      ⬇ Export Results CSV
    </button>
  </aside>

  <!-- ───── MAIN ───── -->
  <main class="main" id="main-content">
    <div class="empty-state">
      <div class="icon">🖥️</div>
      <p>Add processes and click <strong>Run Simulation</strong> to see results.</p>
    </div>
  </main>
</div>

<script>
// ─────────────────────────────────────────
// Process colours
// ─────────────────────────────────────────
const COLORS = [
  '#6c63ff','#00d4aa','#ff6b6b','#ffa94d',
  '#74c0fc','#f783ac','#a9e34b','#da77f2',
  '#63e6be','#ffd43b',
];
function procColor(pid) { return COLORS[(pid-1) % COLORS.length]; }

// ─────────────────────────────────────────
// Row management
// ─────────────────────────────────────────
let rowCount = 0;

function addRow(pid='', arrival='', burst='', priority='0') {
  rowCount++;
  const id = rowCount;
  const body = document.getElementById('proc-body');
  const tr = document.createElement('tr');
  tr.id = `row-${id}`;
  tr.innerHTML = `
    <td><input type="number" value="${pid||id}" min="1" class="pid-inp"/></td>
    <td><input type="number" value="${arrival}" min="0"/></td>
    <td><input type="number" value="${burst||''}"  min="1"/></td>
    <td><input type="number" value="${priority}" min="0"/></td>
    <td><button class="del-btn" onclick="delRow(${id})">✕</button></td>
  `;
  body.appendChild(tr);
}

function delRow(id) {
  document.getElementById(`row-${id}`)?.remove();
}

function clearAll() {
  document.getElementById('proc-body').innerHTML = '';
  rowCount = 0;
}

function loadSample() {
  clearAll();
  [[1,0,5,0],[2,1,3,0],[3,2,8,0],[4,3,6,0]].forEach(
    ([p,a,b,pr]) => addRow(p,a,b,pr)
  );
}

function getProcesses() {
  const rows = document.querySelectorAll('#proc-body tr');
  const procs = [];
  for (const row of rows) {
    const inputs = row.querySelectorAll('input');
    const pid     = parseInt(inputs[0].value);
    const arrival = parseInt(inputs[1].value);
    const burst   = parseInt(inputs[2].value);
    const priority= parseInt(inputs[3].value) || 0;
    if (!isNaN(pid) && !isNaN(arrival) && !isNaN(burst) && burst > 0) {
      procs.push({ pid, arrival, burst, priority });
    }
  }
  return procs;
}

// ─────────────────────────────────────────
// Config UI
// ─────────────────────────────────────────
function onAlgoChange() {
  const v = document.getElementById('algo-select').value;
  document.getElementById('rr-config').style.display   = v==='rr' ? '' : 'none';
  document.getElementById('mlfq-config').style.display = v==='mlfq' ? '' : 'none';
  document.getElementById('rr-mlfq-both').style.display= v==='all' ? '' : 'none';
}

// ─────────────────────────────────────────
// Scheduling algorithms (JS port)
// ─────────────────────────────────────────
function deepClone(procs) {
  return procs.map(p => ({...p, remaining: p.burst,
    start_time:null, finish_time:null, wt:null, tat:null, rt:null}));
}

function computeMetrics(procs) {
  procs.forEach(p => {
    p.tat = p.finish_time - p.arrival;
    p.wt  = p.tat - p.burst;
    p.rt  = p.start_time - p.arrival;
  });
}

function avgMetrics(procs) {
  const n = procs.length;
  return {
    wt:  procs.reduce((s,p)=>s+p.wt, 0)/n,
    tat: procs.reduce((s,p)=>s+p.tat,0)/n,
    rt:  procs.reduce((s,p)=>s+p.rt, 0)/n,
  };
}

// FCFS
function fcfs(processes) {
  const procs = deepClone(processes).sort((a,b)=>a.arrival-b.arrival||a.pid-b.pid);
  const gantt = []; let time = 0;
  for (const p of procs) {
    if (time < p.arrival) { gantt.push({pid:'IDLE', start:time, end:p.arrival}); time=p.arrival; }
    p.start_time = time; time += p.burst; p.finish_time = time;
    gantt.push({pid:p.pid, start:p.start_time, end:p.finish_time});
  }
  computeMetrics(procs);
  return { procs, gantt };
}

// SJF
function sjf(processes) {
  const procs = deepClone(processes); const done=[]; const gantt=[]; let time=0;
  const remaining = [...procs];
  while (remaining.length) {
    let avail = remaining.filter(p=>p.arrival<=time);
    if (!avail.length) {
      const na = Math.min(...remaining.map(p=>p.arrival));
      gantt.push({pid:'IDLE',start:time,end:na}); time=na;
      avail = remaining.filter(p=>p.arrival<=time);
    }
    const chosen = avail.sort((a,b)=>a.burst-b.burst||a.pid-b.pid)[0];
    remaining.splice(remaining.indexOf(chosen),1);
    chosen.start_time=time; time+=chosen.burst; chosen.finish_time=time;
    gantt.push({pid:chosen.pid,start:chosen.start_time,end:chosen.finish_time});
    done.push(chosen);
  }
  computeMetrics(done);
  return {procs:done, gantt};
}

// SRT
function srt(processes) {
  const procs = deepClone(processes);
  const gantt=[]; let time=0; const done=[]; const n=procs.length;
  while (done.length < n) {
    const avail = procs.filter(p=>p.arrival<=time && p.finish_time==null);
    if (!avail.length) {
      const na=Math.min(...procs.filter(p=>!p.finish_time).map(p=>p.arrival));
      const last=gantt[gantt.length-1];
      if (last&&last.pid==='IDLE') last.end=na; else gantt.push({pid:'IDLE',start:time,end:na});
      time=na; continue;
    }
    const chosen=avail.sort((a,b)=>a.remaining-b.remaining||a.pid-b.pid)[0];
    if (chosen.start_time==null) chosen.start_time=time;
    const future=procs.filter(p=>p.arrival>time&&!p.finish_time).map(p=>p.arrival);
    const runUntil=future.length ? Math.min(time+chosen.remaining,Math.min(...future)) : time+chosen.remaining;
    const rt=runUntil-time; chosen.remaining-=rt;
    const last=gantt[gantt.length-1];
    if (last&&last.pid===chosen.pid) last.end=runUntil; else gantt.push({pid:chosen.pid,start:time,end:runUntil});
    time=runUntil;
    if (chosen.remaining===0){chosen.finish_time=time; done.push(chosen);}
  }
  computeMetrics(done);
  return{procs:done,gantt};
}

// Round Robin
function roundRobin(processes, quantum) {
  const procs = deepClone(processes);
  const sorted=[...procs].sort((a,b)=>a.arrival-b.arrival||a.pid-b.pid);
  const queue=[]; const gantt=[]; let time=0; let idx=0; const done=[];
  const enqueue=()=>{ while(idx<sorted.length&&sorted[idx].arrival<=time){queue.push(sorted[idx]);idx++;} };
  enqueue();
  while(queue.length||idx<sorted.length){
    if(!queue.length){
      const na=sorted[idx].arrival;
      gantt.push({pid:'IDLE',start:time,end:na}); time=na; enqueue();
    }
    const p=queue.shift();
    if(p.start_time==null) p.start_time=time;
    const run=Math.min(quantum,p.remaining); p.remaining-=run;
    const end=time+run;
    const last=gantt[gantt.length-1];
    if(last&&last.pid===p.pid) last.end=end; else gantt.push({pid:p.pid,start:time,end});
    time=end; enqueue();
    if(p.remaining>0) queue.push(p);
    else{p.finish_time=time; done.push(p);}
  }
  computeMetrics(done);
  return{procs:done,gantt};
}

// MLFQ
function mlfqAlgo(processes, quantums=[2,4,Infinity], agingThreshold=10) {
  const procs = deepClone(processes);
  procs.forEach(p=>{p.queue_level=0;p.wait_since=p.arrival;});
  const sorted=[...procs].sort((a,b)=>a.arrival-b.arrival||a.pid-b.pid);
  const queues=[[],[],[]]; const gantt=[]; let time=0; let idx=0; const done=[];
  const enqueue=()=>{while(idx<sorted.length&&sorted[idx].arrival<=time){queues[0].push(sorted[idx]);idx++;}};
  enqueue();
  while(done.length<procs.length){
    // aging
    for(let lvl=1;lvl<3;lvl++){
      const toPromote=queues[lvl].filter(p=>time-p.wait_since>=agingThreshold);
      toPromote.forEach(p=>{queues[lvl].splice(queues[lvl].indexOf(p),1);p.queue_level=0;p.wait_since=time;queues[0].push(p);});
    }
    let ql=-1;
    for(let l=0;l<3;l++){if(queues[l].length){ql=l;break;}}
    if(ql===-1){
      if(idx<sorted.length){const na=sorted[idx].arrival;gantt.push({pid:'IDLE',start:time,end:na});time=na;enqueue();}
      continue;
    }
    const p=queues[ql].shift();
    if(p.start_time==null) p.start_time=time;
    const q=quantums[ql]===Infinity?p.remaining:quantums[ql];
    const run=Math.min(q,p.remaining);
    const endT=time+run; p.remaining-=run;
    const last=gantt[gantt.length-1];
    if(last&&last.pid===p.pid) last.end=endT; else gantt.push({pid:p.pid,start:time,end:endT});
    time=endT; enqueue();
    if(p.remaining===0){p.finish_time=time;done.push(p);}
    else{
      const demoted=run===q&&ql<2?ql+1:ql;
      p.queue_level=demoted; p.wait_since=time;
      queues[demoted].push(p);
    }
  }
  computeMetrics(done);
  return{procs:done,gantt};
}

// ─────────────────────────────────────────
// Render
// ─────────────────────────────────────────
let lastResults = null;

function simulate() {
  const processes = getProcesses();
  if (!processes.length) { alert('Please add at least one process.'); return; }

  const algo = document.getElementById('algo-select').value;
  const rrQ  = parseInt(document.getElementById(algo==='rr'?'rr-q':'all-rr-q')?.value)||2;
  const mQ1  = parseInt(document.getElementById('mlfq-q1')?.value)||2;
  const mQ2  = parseInt(document.getElementById('mlfq-q2')?.value)||4;
  const mAge = parseInt(document.getElementById('mlfq-age')?.value)||10;

  let results = [];

  const run = (name, fn) => { const r=fn(); results.push({name, ...r}); };

  if (algo==='all'||algo==='fcfs')  run('FCFS',  ()=>fcfs(processes));
  if (algo==='all'||algo==='sjf')   run('SJF',   ()=>sjf(processes));
  if (algo==='all'||algo==='srt')   run('SRT',   ()=>srt(processes));
  if (algo==='all'||algo==='rr')    run(`RR (q=${rrQ})`, ()=>roundRobin(processes,rrQ));
  if (algo==='all'||algo==='mlfq')  run('MLFQ',  ()=>mlfqAlgo(processes,[mQ1,mQ2,Infinity],mAge));

  lastResults = results;
  renderResults(results, algo==='all');
}

function renderResults(results, showCompare) {
  const main = document.getElementById('main-content');

  let html = '';

  if (showCompare && results.length > 1) {
    html += renderComparison(results);
  }

  // Tabs
  html += `<div class="algo-tabs">`;
  results.forEach((r,i)=>{
    html += `<button class="algo-tab ${i===0?'active':''}" onclick="showTab(${i})" id="tab-${i}">${r.name}</button>`;
  });
  html += `</div>`;

  results.forEach((r,i)=>{
    html += `<div id="result-${i}" style="${i===0?'':'display:none'}">`;
    html += renderSingle(r);
    html += `</div>`;
  });

  main.innerHTML = html;
}

function showTab(idx) {
  document.querySelectorAll('.algo-tab').forEach((t,i)=>{
    t.classList.toggle('active', i===idx);
  });
  document.querySelectorAll('[id^="result-"]').forEach((d,i)=>{
    d.style.display = i===idx ? '' : 'none';
  });
}

function renderSingle(result) {
  const {name, procs, gantt} = result;
  const avgs = avgMetrics(procs);
  const sorted = [...procs].sort((a,b)=>a.pid-b.pid);

  // Gantt
  const totalTime = gantt[gantt.length-1].end;
  let ganttHtml = '<div class="gantt-container"><div class="gantt-row">';
  gantt.forEach(g=>{
    const w = Math.max(((g.end-g.start)/totalTime)*100, 2);
    const isIdle = g.pid==='IDLE';
    const bg = isIdle ? '' : `background:${procColor(g.pid)}22;border-left:3px solid ${procColor(g.pid)}`;
    const lbl = isIdle ? 'idle' : `P${g.pid}`;
    ganttHtml += `<div class="gantt-block${isIdle?' idle':''}" style="width:${w}%;${bg}" title="${lbl}: ${g.start}–${g.end}">${lbl}</div>`;
  });
  ganttHtml += `</div><div class="gantt-times" style="position:relative;height:20px">`;

  // tick marks
  const ticks = new Set([...gantt.flatMap(g=>[g.start,g.end])]);
  [...ticks].sort((a,b)=>a-b).forEach(t=>{
    const left = (t/totalTime)*100;
    ganttHtml += `<span class="gantt-tick" style="left:${left}%">${t}</span>`;
  });
  ganttHtml += `</div></div>`;

  // Metrics table
  let tableHtml = `<table class="metrics-table">
    <thead><tr>
      <th>PID</th><th>Arrival</th><th>Burst</th>
      <th>Start</th><th>Finish</th>
      <th>Wait (WT)</th><th>Turnaround (TAT)</th><th>Response (RT)</th>
    </tr></thead><tbody>`;

  sorted.forEach(p=>{
    const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${procColor(p.pid)};margin-right:5px"></span>`;
    tableHtml += `<tr>
      <td>${dot}P${p.pid}</td>
      <td>${p.arrival}</td><td>${p.burst}</td>
      <td>${p.start_time}</td><td>${p.finish_time}</td>
      <td>${p.wt}</td><td>${p.tat}</td><td>${p.rt}</td>
    </tr>`;
  });

  tableHtml += `<tr class="avg-row">
    <td colspan="5">Average</td>
    <td>${avgs.wt.toFixed(2)}</td>
    <td>${avgs.tat.toFixed(2)}</td>
    <td>${avgs.rt.toFixed(2)}</td>
  </tr></tbody></table>`;

  return `
    <div class="card">
      <div class="card-title">Gantt Chart — ${name}</div>
      <div class="gantt-wrap">${ganttHtml}</div>
    </div>
    <div class="card">
      <div class="card-title">Metrics Table — ${name}</div>
      ${tableHtml}
    </div>`;
}

function renderComparison(results) {
  const metrics = ['wt','tat','rt'];
  const labels  = {'wt':'Avg Waiting','tat':'Avg Turnaround','rt':'Avg Response'};
  const barColors= ['#6c63ff','#00d4aa','#ff6b6b'];

  let html = `<div class="card"><div class="card-title">📊 Comparative Analysis</div><div class="compare-grid">`;

  metrics.forEach((m,mi)=>{
    const vals = results.map(r=>({name:r.name, val:avgMetrics(r.procs)[m]}));
    const max  = Math.max(...vals.map(v=>v.val));
    html += `<div class="compare-card"><h4>${labels[m]} Time</h4>`;
    vals.forEach(v=>{
      const pct = max===0?0:(v.val/max)*100;
      html += `<div class="bar-row">
        <div class="bar-label">${v.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColors[mi]}"></div></div>
        <div class="bar-val">${v.val.toFixed(2)}</div>
      </div>`;
    });
    html += `</div>`;
  });

  html += `</div></div>`;
  return html;
}

// ─────────────────────────────────────────
// Export CSV
// ─────────────────────────────────────────
function exportCSV() {
  if (!lastResults) { alert('Run a simulation first.'); return; }
  let csv = 'Algorithm,PID,Arrival,Burst,Start,Finish,WaitingTime,Turnaround,ResponseTime\n';
  lastResults.forEach(r=>{
    r.procs.sort((a,b)=>a.pid-b.pid).forEach(p=>{
      csv += `${r.name},${p.pid},${p.arrival},${p.burst},${p.start_time},${p.finish_time},${p.wt},${p.tat},${p.rt}\n`;
    });
    const avgs = avgMetrics(r.procs);
    csv += `${r.name},AVERAGE,,,,,${avgs.wt.toFixed(2)},${avgs.tat.toFixed(2)},${avgs.rt.toFixed(2)}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scheduling_results.csv';
  a.click();
}
